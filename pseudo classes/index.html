<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pseudo classes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p>escolher trocar estilos em momentos explecificos </p>
    <a class="active">meu link active</a> <p> muda de cor quando clicado</p>
    <br>
    <a class="visited" href="#222222">meu link visited</a> <p>fica roxo apos clicado uma vez</p>
    <br>
    <a class="hover">meu link hover</a> <p>muda de cor quando o mouse passa por cima</p>
    <br>
    <input type="checkbox" class="checked" id="checked"> <p>muda quando marcado</p>
    <label for="checked">checked</label>
</body>
</html>
